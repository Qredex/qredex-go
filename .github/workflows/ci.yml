name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ["1.21", "1.22", "1.23"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup ota
        uses: ota-run/setup@v1
        with:
          ota-version: 1.6.1

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Validate ota contract
        run: ota validate

      - name: Build
        run: ota run build

      - name: Coverage
        run: ota run coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.txt
          flags: unittests
          token: ${{ secrets.CODECOV_TOKEN }}

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup ota
        uses: ota-run/setup@v1
        with:
          ota-version: 1.6.1

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Validate ota contract
        run: ota validate

      - name: Run golangci-lint
        run: ota run lint

  vet:
    name: Vet
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup ota
        uses: ota-run/setup@v1
        with:
          ota-version: 1.6.1

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Validate ota contract
        run: ota validate

      - name: Run go vet
        run: ota run vet

  format:
    name: Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup ota
        uses: ota-run/setup@v1
        with:
          ota-version: 1.6.1

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Validate ota contract
        run: ota validate

      - name: Check formatting
        run: ota run format

  module:
    name: Module
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup ota
        uses: ota-run/setup@v1
        with:
          ota-version: 1.6.1

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Validate ota contract
        run: ota validate

      - name: Verify module
        run: ota run module
