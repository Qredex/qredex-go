name: Create release tag from version bump

on:
  push:
    branches:
      - main
    paths:
      - config.go
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: go-tag-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tag-release:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract current SDKVersion
        id: current
        shell: bash
        run: |
          CURRENT_VERSION=$(grep -oE 'const SDKVersion = "[0-9]+\.[0-9]+\.[0-9]+"' config.go | sed -E 's/.*"([0-9]+\.[0-9]+\.[0-9]+)"/\1/')
          if [[ -z "${CURRENT_VERSION}" ]]; then
            echo "Could not extract SDKVersion from config.go." >&2
            exit 1
          fi
          echo "version=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Extract previous SDKVersion
        id: previous
        shell: bash
        run: |
          PREVIOUS_VERSION=$(git show HEAD~1:config.go 2>/dev/null | grep -oE 'const SDKVersion = "[0-9]+\.[0-9]+\.[0-9]+"' | sed -E 's/.*"([0-9]+\.[0-9]+\.[0-9]+)"/\1/' || true)
          echo "version=${PREVIOUS_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check whether version changed
        id: version_check
        shell: bash
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          PREVIOUS="${{ steps.previous.outputs.version }}"
          if [[ -n "${PREVIOUS}" && "${CURRENT}" == "${PREVIOUS}" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "SDKVersion unchanged (${CURRENT}); skipping."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "SDKVersion changed: ${PREVIOUS:-none} -> ${CURRENT}"
          fi

      - name: Check whether release tag already exists
        id: tag_check
        if: steps.version_check.outputs.changed == 'true'
        shell: bash
        run: |
          TAG="${{ steps.current.outputs.tag }}"
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release tag ${TAG} already exists; skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push release tag
        if: steps.version_check.outputs.changed == 'true' && steps.tag_check.outputs.exists == 'false'
        shell: bash
        run: |
          TAG="${{ steps.current.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"

      - name: Check whether release already exists
        id: release_check
        if: steps.version_check.outputs.changed == 'true'
        shell: bash
        run: |
          TAG="${{ steps.current.outputs.tag }}"
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release ${TAG} already exists; skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract release notes
        if: steps.version_check.outputs.changed == 'true' && steps.release_check.outputs.exists == 'false'
        id: release_notes
        uses: ffurrer2/extract-release-notes@v3
        with:
          changelog_path: CHANGELOG.md

      - name: Create GitHub Release
        if: steps.version_check.outputs.changed == 'true' && steps.release_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.current.outputs.tag }}
          name: Release ${{ steps.current.outputs.tag }}
          body: |
            ${{ steps.release_notes.outputs.release_notes }}

            ## Installation

            ```bash
            go get github.com/Qredex/qredex-go@${{ steps.current.outputs.tag }}
            ```
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
