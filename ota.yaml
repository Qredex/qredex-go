version: 1
project:
  name: qredex-go
  description: Go client for Qredex integrations
  type: library
metadata:
  team: sdk
  owner: qredex
  repo_class: go-sdk
runtimes:
  go: '>=1.21'
execution:
  preferred: native
  supported:
    - native
tools:
  go: '*'
  golangci-lint: '*'
tasks:
  setup:
    description: Download Go module dependencies
    notes: |
      Use this first after cloning or when module dependencies change.
    category: setup
    run: go mod download
    safe_for_agent: true
  build:
    description: Build the Go SDK
    notes: |
      Use this to confirm the Go package still builds cleanly.
    category: build
    run: go build ./...
    depends_on:
      - setup
    safe_for_agent: true
  test:
    description: Run the Go test suite
    notes: |
      Use this for the standard Go unit test pass.
    category: test
    run: go test ./...
    depends_on:
      - setup
    safe_for_agent: true
  vet:
    description: Run Go vet
    notes: |
      Use this for static analysis of suspicious Go code patterns.
    category: test
    run: go vet ./...
    depends_on:
      - setup
    safe_for_agent: true
  lint:
    description: Run golangci-lint
    notes: |
      Use this for the full lint gate before merging changes.
    category: test
    script: |
      if ! command -v golangci-lint >/dev/null 2>&1; then
        go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
        lint_bin_dir="$(go env GOBIN)"
        if [ -z "$lint_bin_dir" ]; then
          lint_bin_dir="$(go env GOPATH)/bin"
        fi
        export PATH="$lint_bin_dir:$PATH"
      fi

      golangci-lint run ./...
    depends_on:
      - setup
    safe_for_agent: true
  coverage:
    description: Run the Go test suite with coverage
    notes: |
      Use this when you need coverage data or a heavier validation run.
    category: test
    run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...
    depends_on:
      - setup
    safe_for_agent: true
  format:
    description: Check Go formatting
    notes: |
      Use this before committing to catch formatting drift early.
    category: test
    script: |
      go fmt ./...
      git diff --exit-code
    depends_on:
      - setup
    safe_for_agent: true
  module:
    description: Verify the Go module graph
    notes: |
      Use this when you want to confirm module metadata is still consistent.
    category: test
    script: |
      go mod verify
      go mod tidy
      git diff --exit-code
    depends_on:
      - setup
    safe_for_agent: true
  ci:
    description: Run the Go verification suite
    notes: |
      Use this as the canonical local verification path before merging changes.
    category: test
    script: |
      go build ./...
      go test ./...
      go vet ./...
      if ! command -v golangci-lint >/dev/null 2>&1; then
        go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
        lint_bin_dir="$(go env GOBIN)"
        if [ -z "$lint_bin_dir" ]; then
          lint_bin_dir="$(go env GOPATH)/bin"
        fi
        export PATH="$lint_bin_dir:$PATH"
      fi

      golangci-lint run ./...
    depends_on:
      - setup
    safe_for_agent: true
  release:check:
    description: Run the release verification suite
    notes: |
      Use this as the release gate before tagging or pushing a release.
      This task composes build, test, vet, and lint.
      Example: ota run release:check
      Typical flow:
        ota run release:check
        ota run release:version --version x.y.z
    category: release
    depends_on:
      - build
      - test
      - vet
      - lint
    script: ":"
    safe_for_agent: true
  release:version:
    description: Bump the SDK version and promote the changelog
    notes: |
      Use this when preparing a new release version.
      You can pass `major`, `minor`, `patch`, or an explicit semantic version.
      Example: `ota run release:version --version minor`
      Run `ota run release:check` before this task.
      This updates the SDKVersion constant in config.go and promotes the
      Unreleased changelog entry into the new version section.
      The task forwards `--version` into `OTA_INPUT_VERSION`.
    category: release
    depends_on:
      - release:check
    script: |
      input_version="${OTA_INPUT_VERSION}"
      if [ -z "$input_version" ]; then
        echo "Usage: ota run release:version --version major|minor|patch|<x.y.z>" >&2
        exit 1
      fi

      current_version="$(sed -n 's/.*const SDKVersion = \"\([0-9]*\.[0-9]*\.[0-9]*\)\".*/\1/p' config.go | head -n1)"
      release_date="$(date -u +%F)"

      if [ -z "$current_version" ]; then
        echo "Could not determine the current SDK version from config.go" >&2
        exit 1
      fi

      resolve_version() {
        current="$1"
        input="$2"
        major="${current%%.*}"
        remainder="${current#*.}"
        minor="${remainder%%.*}"
        patch="${current##*.}"

        case "$input" in
          major)
            echo "$((major + 1)).0.0"
            ;;
          minor)
            echo "$major.$((minor + 1)).0"
            ;;
          patch)
            echo "$major.$minor.$((patch + 1))"
            ;;
          *)
            echo "$input"
            ;;
        esac
      }

      if [ "$input_version" = "major" ] || [ "$input_version" = "minor" ] || [ "$input_version" = "patch" ]; then
        version="$(resolve_version "$current_version" "$input_version")"
      else
        version="${input_version#v}"
        if ! printf '%s' "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
          echo "Invalid semver version: $input_version" >&2
          exit 1
        fi
      fi

      perl -0pi -e 's/const SDKVersion = "[^"]+"/const SDKVersion = "'$version'"/' config.go
      echo "Updated config.go SDKVersion to $version"

      if grep -Eq '^## \['"$version"'\] - ' CHANGELOG.md; then
        echo "CHANGELOG.md already contains release $version"
        exit 0
      fi

      if ! grep -Eq '^## \[Unreleased\]$' CHANGELOG.md; then
        echo "CHANGELOG.md is missing the Unreleased heading" >&2
        exit 1
      fi

      perl -0pi -e 's/^## \[Unreleased\]\n\n/## [Unreleased]\n\n## ['"$version"'] - '"$release_date"'\n\n/m' CHANGELOG.md
      echo "Updated CHANGELOG.md for $version"
    inputs:
      version:
        description: Release bump selector or semantic version to apply to config.go
        required: true
agent:
  bootstrap:
    ota:
      note: Only install ota if it is missing and installation is approved.
      sh: curl -fsSL https://dist.ota.run/install.sh | sh
      powershell: irm https://dist.ota.run/install.ps1 | iex
  entrypoint: setup
  default_task: ci
  safe_tasks:
    - setup
    - build
    - test
    - vet
    - lint
    - release:check
    - coverage
    - format
    - module
    - ci
  verify_after_changes:
    - test
    - vet
    - lint
    - coverage
    - format
    - module
    - ci
  writable_paths:
    - .
    - examples
    - README.md
    - SECURITY.md
    - AGENTS.md
  protected_paths:
    - go.sum
    - target
    - ota.yaml
  notes: |
    Use the Ota workflow first for setup, validation, and task execution.
    Treat Ota as the default workflow, the way npm is the default in Node repos.
    Use `ota validate` to verify the contract.
    Use `ota doctor` to inspect readiness and agent guidance.
    Use `ota tasks` to discover runnable repo actions.
    Use `ota run setup` to prepare the repo.
    Use `ota run ci` to run the canonical verification path.
    Keep the Go SDK deterministic and simple.
